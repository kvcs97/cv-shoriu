function renderRepeat(s) {

function repItemHTML(s, item, idx) {

if (canRm) html += “<button class="rep-rm" data-ridx="” + idx + “">×</button>”;

html += “<div class="fw"><label>” + f.label + “</label>” + repFieldHTML(f, item[f.key] || “”, idx) + “</div>”;
}
html += “</div></div>”;
return html;
}

function bindRepRemove(s) {
var btns = document.querySelectorAll(”.rep-rm”);
for (var i = 0; i < btns.length; i++) {
(function(btn) {
btn.onclick = function() {
saveRepeat(s);
var idx = parseInt(btn.getAttribute(“data-ridx”));
data[s.id].splice(idx, 1);
renderRepeat(s);
};
})(btns[i]);
}
}

function addRep(s) {
saveRepeat(s);
var blank = {};
for (var i = 0; i < s.fields.length; i++) blank[s.fields[i].key] = “”;
data[s.id].push(blank);
renderRepeat(s);
}

for (var i = 0; i < els.length; i++) {

var idx = parseInt(el.getAttribute(“data-idx”));
var key = el.getAttribute(“data-key”);
if (data[s.id][idx] !== undefined) data[s.id][idx][key] = el.value;
}
}

function parseCV(raw) {
if (!raw) return {name: “”, pos: “”, contact: “”, secs: []};
var lines = raw.split(”\n”), name = “”, pos = “”, contact = “”, secs = [], cur = null;
for (var i = 0; i < lines.length; i++) {
var l = lines[i].trim();
if (!l) continue;
if      (l.indexOf(”# “) === 0 && l.indexOf(”## “) < 0)                                  { name = l.slice(2).trim(); }
else if (!pos && l.indexOf(”**”) === 0 && l.lastIndexOf(”**”) > 1 && l.indexOf(”|”) < 0) { pos = l.replace(/**/g, “”).trim(); }
else if (!contact && (l.indexOf(”@”) >= 0 || l.indexOf(”|”) >= 0))                        { contact = l.replace(/**/g, “”).trim(); }
else if (l.indexOf(”## “) === 0)  { cur = {h: l.slice(3).trim(), items: []}; secs.push(cur); }
else if (l.indexOf(”### “) === 0) { if (cur) cur.items.push({t: “j”, v: l.slice(4).trim()}); }
else if (l.indexOf(”- “) === 0 || l.indexOf(”* “) === 0) { if (cur) cur.items.push({t: “b”, v: l.slice(2).trim().replace(/**/g, “”)}); }
else if (l.indexOf(”**”) === 0 && l.lastIndexOf(”**”) > 1) { if (cur) cur.items.push({t: “j”, v: l.replace(/**/g, “”).trim()}); }
else { if (cur) cur.items.push({t: “t”, v: l.replace(/**/g, “”)}); }
}
return {name: name, pos: pos, contact: contact, secs: secs};
}

function x(v) {
return (v || “”).replace(/&/g, “&”).replace(/</g, “<”).replace(/>/g, “>”);
}

function itemsHTML(items, pfx) {
var html = “”;
for (var i = 0; i < items.length; i++) {
var it = items[i];
if      (it.t === “j”) html += “<div class="” + pfx + “ cj">” + x(it.v) + “</div>”;
else if (it.t === “b”) html += “<div class="” + pfx + “ cb">” + x(it.v) + “</div>”;
else                   html += “<div class="” + pfx + “ ct">” + x(it.v) + “</div>”;
}
return html;
}
