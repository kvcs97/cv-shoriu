<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lebenslauf-Generator - Shoriu</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+JP:wght@300;400&family=EB+Garamond:wght@400;700&family=Playfair+Display:wght@400;700&family=DM+Serif+Display&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f0;font-family:"Cormorant Garamond",Georgia,serif;min-height:100vh;color:#1a1a2e}

/* HEADER - elegant, no harsh dark blue */
.hdr{background:#f5f5f0;border-bottom:1px solid #e8e0d8;padding:18px 28px;display:flex;align-items:center;gap:14px}
.hdr .k{font-family:“Noto Serif JP”,serif;font-size:26px;color:#e8a0a0}
.hdr .t{font-size:16px;letter-spacing:.06em;font-weight:300;color:#1a1a2e}
.hdr .s{font-size:10px;color:#b0a898;letter-spacing:.14em;text-transform:uppercase;margin-top:3px}

/* PROGRESS */
.progress{display:flex;gap:3px;max-width:680px;margin:32px auto 0;padding:0 20px}
.pi{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:default}
.pd{width:34px;height:34px;border-radius:50%;background:#ede8e3;color:#b0a898;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:“Noto Serif JP”,serif;transition:all .3s;border:1.5px solid transparent}
.pd.done{background:#d4a0a0;color:#fff;cursor:pointer;border-color:#d4a0a0}
.pd.active{background:#fff;color:#e8a0a0;border-color:#e8a0a0;box-shadow:0 0 0 3px #fdf0f0}
.pl{font-size:9px;color:#b0a898;text-align:center;letter-spacing:.04em}
.pl.active{color:#1a1a2e;font-weight:600}

/* FORM WRAP */
.fw{max-width:680px;margin:24px auto 0;padding:0 20px 48px}

/* CARD */
.card{background:#fff;border-radius:16px;padding:32px;box-shadow:0 2px 16px rgba(0,0,0,.05);border:1px solid #ede8e3}
.card-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:28px}
.card-k{font-family:“Noto Serif JP”,serif;font-size:40px;color:#e8c8c8;line-height:1}
.card-t{font-size:22px;font-weight:300;color:#1a1a2e;line-height:1.2}
.card-s{font-size:11px;color:#b0a898;margin-top:4px;letter-spacing:.04em}

/* FIELDS */
.fields{display:flex;flex-direction:column;gap:18px}
.fl label{display:block;font-size:11px;font-weight:600;color:#b0a898;margin-bottom:6px;letter-spacing:.1em;text-transform:uppercase}
.fl input,.fl textarea,.fl select{
width:100%;padding:12px 16px;
border:1.5px solid #ede8e3;border-radius:10px;
font-size:15px;font-family:“Cormorant Garamond”,Georgia,serif;
background:#fdfcfb;color:#1a1a2e;outline:none;
transition:border-color .2s,background .2s;
line-height:1.5;
}
.fl input:focus,.fl textarea:focus,.fl select:focus{border-color:#e8a0a0;background:#fff}
.fl textarea{resize:vertical;line-height:1.65}
.fl input::placeholder,.fl textarea::placeholder{color:#c8c0b8}

/* REPEAT */
.rb{background:#fef9f9;border-radius:12px;padding:20px;border:1px solid #f0dede;position:relative;margin-bottom:14px}
.rr{position:absolute;top:12px;right:12px;background:none;border:none;color:#c8b8b8;cursor:pointer;font-size:20px;line-height:1;padding:0}
.rr:hover{color:#e8a0a0}
.ri{display:flex;flex-direction:column;gap:14px}
.ra{background:none;border:1.5px dashed #e8c8c8;color:#c8a0a0;padding:11px;border-radius:10px;cursor:pointer;font-size:14px;font-family:“Cormorant Garamond”,serif;width:100%;margin-top:4px;transition:all .2s}
.ra:hover{border-color:#e8a0a0;color:#e8a0a0}

/* NAVIGATION */
.nav{display:flex;justify-content:space-between;margin-top:24px;gap:12px}
.btn-back{background:none;border:1.5px solid #ede8e3;color:#8a8a8a;padding:12px 24px;border-radius:10px;cursor:pointer;font-size:14px;font-family:“Cormorant Garamond”,serif;transition:all .2s}
.btn-back:hover{border-color:#b0a898;color:#1a1a2e}
.btn-back:disabled{opacity:.35;cursor:default}
.btn-next{background:#e8a0a0;color:#fff;border:none;padding:12px 36px;border-radius:10px;cursor:pointer;font-size:16px;font-family:“Cormorant Garamond”,serif;letter-spacing:.04em;transition:background .2s;display:inline-flex;align-items:center;gap:10px}
.btn-next:hover{background:#d48888}
.btn-next:disabled{background:#c8b8b8;cursor:default}
.btn-next.dark{background:#2a2a3e}
.btn-next.dark:hover{background:#1a1a2e}

.err{color:#c05050;text-align:center;margin-top:16px;font-size:13px;display:none;padding:10px;background:#fff5f5;border-radius:8px}
.sp{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite}

/* RESULT WRAP */
.rw{max-width:1100px;margin:0 auto;padding:32px 20px 48px;display:none}
.rt{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.rt-title{font-size:22px;font-weight:300;color:#1a1a2e}
.rt-sub{font-size:11px;color:#b0a898;margin-top:3px;letter-spacing:.04em}
.rt-acts{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-family:“Cormorant Garamond”,serif;transition:all .2s}
.btn-sm-g{background:none;border:1.5px solid #ede8e3;color:#6a6a6a}
.btn-sm-g:hover{border-color:#b0a898;color:#1a1a2e}
.btn-sm-s{background:none;border:1.5px solid #e8c8c8;color:#c88888}
.btn-sm-s:hover{border-color:#e8a0a0;color:#e8a0a0}
.btn-sm-d{background:#2a2a3e;color:#fff;border:none}
.btn-sm-d:hover{background:#1a1a2e}

/* RESULT GRID */
.rg{display:grid;grid-template-columns:190px 1fr;gap:24px;align-items:start}
@media(max-width:640px){.rg{grid-template-columns:1fr}}

/* TEMPLATE PICKER */
.tpl-hd{font-size:10px;font-weight:600;color:#b0a898;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.tpl-ls{display:flex;flex-direction:column;gap:10px}
@media(max-width:640px){.tpl-ls{flex-direction:row;flex-wrap:wrap}}
.tc{cursor:pointer;border:2px solid #ede8e3;border-radius:12px;overflow:hidden;transition:all .2s;background:#fff}
.tc.sel{transform:translateY(-2px)}
.tp{height:82px;position:relative;overflow:hidden}
.teb{position:absolute;top:0;left:0;right:0;height:26px;background:#1a3a5c}
.tsb{position:absolute;top:8px;left:8px;bottom:8px;width:3px;background:#e8a0a0;border-radius:2px}
.tco{position:absolute;right:10px}
.th{height:7px;border-radius:2px;margin-bottom:4px;opacity:.85}
.tsu{height:3px;border-radius:2px;margin-bottom:8px;opacity:.35}
.tln{height:1px;margin-bottom:6px}
.tr{height:3px;border-radius:2px;margin-bottom:3px;background:#d8d4d0}
.tf{padding:9px 12px;background:#fff}
.tn{font-size:13px;font-weight:600;font-family:“Cormorant Garamond”,serif}
.td{font-size:10px;color:#b0a898;margin-top:1px}

/* CV PREVIEW BOX */
.cv-box{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,.07);border:1px solid #ede8e3}
.cv-inner{padding:52px}

/* FOOTER */
.ft{text-align:center;margin-top:20px;font-size:11px;color:#b0a898;letter-spacing:.08em}
.ft .k{font-family:“Noto Serif JP”,serif;color:#e8a0a0}

/* – CV THEME: KLASSISCH – */
.cvk{font-family:“EB Garamond”,Georgia,serif;color:#1a1a1a;line-height:1.75}
.cvk .vh{border-bottom:2px solid #2c3e50;padding-bottom:18px;margin-bottom:24px}
.cvk .vn{font-size:32px;font-weight:700;letter-spacing:.03em;color:#2c3e50}
.cvk .vp{font-size:13px;color:#6a6a7a;letter-spacing:.12em;text-transform:uppercase;margin-top:5px}
.cvk .vc{font-size:12px;color:#8a8a9a;margin-top:8px}
.cvk .vs{margin-bottom:22px}
.cvk .vsh{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#2c3e50;border-bottom:1.5px solid #2c3e50;padding-bottom:4px;margin-bottom:12px}
.cvk .vj{font-weight:700;font-size:14px;color:#1a1a1a;margin-top:12px;margin-bottom:2px}
.cvk .vb{font-size:13px;padding-left:18px;position:relative;color:#3a3a4a;margin-bottom:4px;line-height:1.65}
.cvk .vb::before{content:“�B7”;position:absolute;left:4px;color:#2c3e50;font-size:18px;line-height:1.2}
.cvk .vt{font-size:13px;color:#4a4a5a;line-height:1.75}

/* – CV THEME: SAKURA – */
.cvs{font-family:“Cormorant Garamond”,Georgia,serif;color:#1a1a2e}
.cvs .vh{display:flex;margin-bottom:28px;align-items:stretch}
.cvs .vbar{width:4px;background:linear-gradient(to bottom,#e8a0a0,#c47a7a);border-radius:3px;margin-right:20px;flex-shrink:0}
.cvs .vi{flex:1}
.cvs .vn{font-size:34px;font-weight:300;letter-spacing:.04em;line-height:1.1}
.cvs .vp{font-size:12px;color:#e8a0a0;letter-spacing:.16em;text-transform:uppercase;margin-top:6px;font-weight:500}
.cvs .vc{font-size:12px;color:#9a9aaa;margin-top:7px}
.cvs .vd{font-family:“Noto Serif JP”,serif;font-size:34px;color:#f0d8d8;align-self:center;padding-left:14px;flex-shrink:0}
.cvs .vs{margin-bottom:22px}
.cvs .vsh{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cvs .vl1{height:1px;width:18px;background:#e8a0a0;flex-shrink:0}
.cvs .vst{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#e8a0a0;white-space:nowrap}
.cvs .vl2{flex:1;height:1px;background:#f0d8d8}
.cvs .vj{font-weight:600;font-size:15px;color:#1a1a2e;margin-top:12px;margin-bottom:2px}
.cvs .vb{font-size:13px;padding-left:16px;position:relative;color:#4a4a5a;margin-bottom:4px;line-height:1.65}
.cvs .vb::before{content:“E6”;position:absolute;left:0;color:#e8a0a0}
.cvs .vt{font-size:13px;color:#5a5a6a;line-height:1.75}

/* – CV THEME: EXECUTIVE – */
.cve{font-family:“Playfair Display”,Georgia,serif;color:#1a1a1a}
.cve .vh{background:#1a3a5c;color:#fff;padding:32px 36px;margin:-52px -52px 32px}
.cve .vn{font-size:30px;font-weight:700;letter-spacing:.05em}
.cve .vp{font-size:11px;color:#c8a84a;letter-spacing:.22em;text-transform:uppercase;margin-top:7px}
.cve .vc{font-size:12px;color:rgba(255,255,255,.55);margin-top:10px}
.cve .vs{margin-bottom:22px}
.cve .vsh{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cve .vst{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#1a3a5c;white-space:nowrap}
.cve .vl{flex:1;height:1px;background:#c8a84a}
.cve .vj{font-weight:700;font-size:14px;color:#1a3a5c;margin-top:12px;margin-bottom:2px}
.cve .vb{font-size:13px;padding-left:16px;position:relative;color:#3a3a3a;margin-bottom:4px;line-height:1.65}
.cve .vb::before{content:“B8”;position:absolute;left:0;color:#c8a84a}
.cve .vt{font-size:13px;color:#4a4a4a;line-height:1.75}

/* – CV THEME: MINIMAL – */
.cvm{font-family:“DM Serif Display”,Georgia,serif;color:#111}
.cvm .vh{margin-bottom:32px;border-bottom:1px solid #f0ece8;padding-bottom:20px}
.cvm .vn{font-size:36px;font-weight:400;letter-spacing:-.01em;line-height:1}
.cvm .vp{font-size:12px;color:#9a9a9a;letter-spacing:.08em;margin-top:8px;font-family:“DM Sans”,sans-serif}
.cvm .vc{font-size:12px;color:#c0c0c0;margin-top:5px;font-family:“DM Sans”,sans-serif}
.cvm .vs{margin-bottom:24px;display:grid;grid-template-columns:120px 1fr;gap:0 24px}
.cvm .vsh{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#c0c0c0;padding-top:3px;font-family:“DM Sans”,sans-serif;line-height:1.4}
.cvm .vbo{border-left:1px solid #efefef;padding-left:24px}
.cvm .vj{font-weight:700;font-size:14px;color:#111;margin-top:10px;margin-bottom:2px}
.cvm .vb{font-size:13px;padding-left:16px;position:relative;color:#4a4a4a;margin-bottom:4px;line-height:1.65;font-family:“DM Sans”,sans-serif}
.cvm .vb::before{content:“3”;position:absolute;left:0;color:#d0d0d0}
.cvm .vt{font-size:13px;color:#6a6a6a;line-height:1.75;font-family:“DM Sans”,sans-serif}

@keyframes spin{to{transform:rotate(360deg)}}
</style>

</head>
<body>

<div class="hdr">
  <span class="k">&#26360;&#27969;</span>
  <div>
    <div class="t">Lebenslauf-Generator</div>
    <div class="s">Shoriu &middot; KI-gest&uuml;tzt</div>
  </div>
</div>

<div class="progress" id="progress"></div>

<div class="fw" id="form-wrap">
  <div class="card">
    <div class="card-head">
      <span class="card-k" id="ckanji"></span>
      <div><div class="card-t" id="ctitle"></div><div class="card-s" id="cstep"></div></div>
    </div>
    <div class="fields" id="fields"></div>
  </div>
  <div class="nav">
    <button class="btn-back" id="btn-back">&#8592; Zur&uuml;ck</button>
    <button class="btn-next" id="btn-next">Weiter &#8594;</button>
  </div>
  <div class="err" id="err"></div>
</div>

<div class="rw" id="result-wrap">
  <div class="rt">
    <div>
      <div class="rt-title">Ihr Lebenslauf</div>
      <div class="rt-sub">Template w&auml;hlen &middot; PDF exportieren</div>
    </div>
    <div class="rt-acts">
      <button class="btn-sm btn-sm-g" id="btn-edit">&#8592; Bearbeiten</button>
      <button class="btn-sm btn-sm-s" id="btn-regen">&#8634; Neu generieren</button>
      <button class="btn-sm btn-sm-d" id="btn-print">&#8679; PDF / Drucken</button>
    </div>
  </div>
  <div class="rg">
    <div>
      <div class="tpl-hd">Template</div>
      <div class="tpl-ls" id="tpl-list"></div>
    </div>
    <div class="cv-box"><div class="cv-inner" id="cv-inner"></div></div>
  </div>
  <div class="ft"><span class="k">&#26360;&#27969;</span> Shoriu</div>
</div>

<script>

window.addEventListener('DOMContentLoaded', function() {

  var KANJI  = ['\u500b','\u5fd7','\u6b74','\u5b66','\u6280','\u4ed6'];
  var LABELS = ['Personliches','Uber mich','Erfahrung','Ausbildung','Fahigkeiten','Weiteres'];

  var FIELDS = [
    [
      {key:'name',     label:'Vollstandiger Name',  ph:'Max Mustermann',        type:'text'},
      {key:'title',    label:'Zielposition',         ph:'Senior Logistikleiter', type:'text'},
      {key:'email',    label:'E-Mail',               ph:'max@beispiel.at',       type:'email'},
      {key:'phone',    label:'Telefon',              ph:'+43 660 123 456',       type:'text'},
      {key:'location', label:'Wohnort',              ph:'Altach, Vorarlberg',    type:'text'},
      {key:'linkedin', label:'LinkedIn / Website',   ph:'linkedin.com/in/max',   type:'text'}
    ],
    [
      {key:'summary', label:'Kurzbeschreibung und Karriereziele',
       ph:'Erfahrener Logistikprofi mit 8 Jahren Erfahrung in der Medizintechnik. Meine Staerken liegen in Prozessoptimierung und Teamfuehrung...',
       type:'textarea', rows:5}
    ],
    [
      {key:'company',     label:'Unternehmen',          ph:'medmix Switzerland AG',   type:'text'},
      {key:'role',        label:'Position',              ph:'Teamleader Logistik',     type:'text'},
      {key:'period',      label:'Zeitraum',              ph:'2020 - heute',            type:'text'},
      {key:'description', label:'Aufgaben und Erfolge',
       ph:'Leitung eines 8-koepfigen Teams. Einfuehrung digitaler Prozesse. Fehlerquote um 30% reduziert.',
       type:'textarea', rows:3}
    ],
    [
      {key:'institution', label:'Institution',             ph:'HTL Rankweil',                    type:'text'},
      {key:'degree',      label:'Abschluss Studiengang',   ph:'Matura, Fachrichtung Elektronik', type:'text'},
      {key:'period',      label:'Zeitraum',                ph:'2010 - 2015',                     type:'text'}
    ],
    [
      {key:'technical', label:'Fachliche Kenntnisse', ph:'SAP WM, MS Excel, Lean Management, ERP',      type:'textarea', rows:2},
      {key:'soft',      label:'Soft Skills',           ph:'Teamfuehrung, Kommunikation, Eigeninitiative',type:'textarea', rows:2},
      {key:'languages', label:'Sprachen',              ph:'Deutsch (Muttersprache), Englisch (B2)',      type:'textarea', rows:2}
    ],
    [
      {key:'certifications', label:'Zertifikate optional',  ph:'Lean Six Sigma Yellow Belt, SAP 2022', type:'textarea', rows:2},
      {key:'hobbies',        label:'Interessen optional',   ph:'Softwareentwicklung, Japanische Kultur', type:'textarea', rows:2},
      {key:'tone',     label:'Ton des Lebenslaufs', type:'select', opts:['Professionell und formal','Modern und direkt','Kreativ und persoenlich']},
      {key:'language', label:'Sprache',              type:'select', opts:['Deutsch','Englisch']}
    ]
  ];

  var REPEAT = [false,false,true,true,false,false];

  var TPLS = [
    {id:'sakura',    name:'Sakura',    desc:'Elegant & modern',  acc:'#e8a0a0', bg:'#fef9f9', h:'#e8a0a0', ln:'#f0d8d8', sak:true},
    {id:'klassisch', name:'Klassisch', desc:'Zeitlos & sicher',  acc:'#2c3e50', bg:'#f7f6f4', h:'#2c3e50', ln:'#2c3e50'},
    {id:'executive', name:'Executive', desc:'Senior & Fuehrung', acc:'#1a3a5c', bg:'#f0f4f8', h:'#1a3a5c', ln:'#c8a84a', dark:true},
    {id:'minimal',   name:'Minimal',   desc:'Tech & Design',     acc:'#555',    bg:'#fafafa', h:'#555',    ln:'#e8e8e8'}
  ];

  var step = 0;
  var tpl  = 'sakura';
  var md   = '';

  var data = [
    {name:'',title:'',email:'',phone:'',location:'',linkedin:''},
    {summary:''},
    [{company:'',role:'',period:'',description:''}],
    [{institution:'',degree:'',period:''}],
    {technical:'',soft:'',languages:''},
    {certifications:'',hobbies:'',tone:'Professionell und formal',language:'Deutsch'}
  ];

  var eP   = document.getElementById('progress');
  var eFW  = document.getElementById('form-wrap');
  var eRW  = document.getElementById('result-wrap');
  var eF   = document.getElementById('fields');
  var eK   = document.getElementById('ckanji');
  var eTi  = document.getElementById('ctitle');
  var eSt  = document.getElementById('cstep');
  var eBk  = document.getElementById('btn-back');
  var eBn  = document.getElementById('btn-next');
  var eEr  = document.getElementById('err');
  var eTL  = document.getElementById('tpl-list');
  var eCI  = document.getElementById('cv-inner');

  document.getElementById('btn-edit').onclick  = showForm;
  document.getElementById('btn-regen').onclick = generate;
  document.getElementById('btn-print').onclick = printCV;
  eBk.onclick = function() { save(); if (step > 0) renderStep(step - 1); };
  eBn.onclick = function() { save(); if (step < 5) renderStep(step + 1); else generate(); };

  function buildProgress() {
    var h = '';
    for (var i = 0; i < 6; i++) {
      h += '<div class="pi" id="pi'+i+'">'
         + '<div class="pd" id="pd'+i+'">'+KANJI[i]+'</div>'
         + '<div class="pl" id="pl'+i+'">'+LABELS[i]+'</div>'
         + '</div>';
    }
    eP.innerHTML = h;
    for (var j = 0; j < 6; j++) {
      (function(idx) {
        var el = document.getElementById('pi'+idx);
        if (el) el.onclick = function() { if (idx < step) { save(); renderStep(idx); } };
      })(j);
    }
  }

  function updateProgress() {
    for (var i = 0; i < 6; i++) {
      var d = document.getElementById('pd'+i);
      var l = document.getElementById('pl'+i);
      if (!d || !l) continue;
      d.className = 'pd'+(i===step?' active':i<step?' done':'');
      l.className = 'pl'+(i===step?' active':'');
    }
  }

  function renderStep(n) {
    step = n;
    eK.textContent  = KANJI[step];
    eTi.textContent = LABELS[step];
    eSt.textContent = 'Schritt '+(step+1)+' von 6';
    updateProgress();
    eBk.disabled = (step === 0);
    if (step === 5) {
      eBn.className   = 'btn-next dark';
      eBn.textContent = 'Lebenslauf erstellen';
    } else {
      eBn.className   = 'btn-next';
      eBn.textContent = 'Weiter';
    }
    eBn.disabled = false;
    if (REPEAT[step]) renderRepeat(); else renderFlat();
  }

  function esc(v) {
    return (v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fHTML(f, val) {
    var v = esc(val||''), p = esc(f.ph||'');

/* – PARSE MARKDOWN –––––––––––––––––––––––––– */
function parseCV(raw) {
if (!raw) return {name:’’,pos:’’,contact:’’,secs:[]};
var lines = raw.split(’\n’), name=’’, pos=’’, contact=’’, secs=[], cur=null;
for (var i = 0; i < lines.length; i++) {
var l = lines[i].trim();
if (!l) continue;
if      (l.match(/^# [^#]/))  { name = l.slice(2).trim(); }
else if (!pos && l.match(/^**[^|*]+**$/)) { pos = l.replace(/**/g,’’).trim(); }
else if (!contact && (l.indexOf(’@’)>=0 || l.indexOf(’|’)>=0)) { contact = l.replace(/**/g,’’).trim(); }
else if (l.match(/^## /))  { cur={h:l.slice(3).trim(),items:[]}; secs.push(cur); }
else if (l.match(/^### /)) { if(cur) cur.items.push({t:‘j’,v:l.slice(4).trim()}); }
else if (l.match(/^[-*] /)) { if(cur) cur.items.push({t:‘b’,v:l.slice(2).trim().replace(/**/g,’’)}); }
else if (l.match(/^**[^*]+**/)) { if(cur) cur.items.push({t:‘j’,v:l.replace(/**/g,’’).trim()}); }
else { if(cur && l.length > 2) cur.items.push({t:‘t’,v:l.replace(/**/g,’’)}); }
}
return {name:name, pos:pos, contact:contact, secs:secs};
}

function x(v) { return (v||’’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’); }

function iHTML(items, p) {
var h = ‘’;
for (var i = 0; i < items.length; i++) {
var it = items[i];
if      (it.t===‘j’) h += ‘<div class="'+p+' vj">’+x(it.v)+’</div>’;
else if (it.t===‘b’) h += ‘<div class="'+p+' vb">’+x(it.v)+’</div>’;
else                 h += ‘<div class="'+p+' vt">’+x(it.v)+’</div>’;
}
return h;
}
