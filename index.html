<html lang="de">
<head>

<title>Lebenslauf-Generator - Shoriu</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f0;font-family:"Cormorant Garamond",Georgia,serif;min-height:100vh}
.site-header{background:#1a1a2e;color:#fff;padding:16px 28px;display:flex;align-items:center;gap:14px}
.site-header .k{font-family:"Noto Serif JP",serif;font-size:24px;color:#e8a0a0}
.site-header .t{font-size:15px;letter-spacing:.08em;font-weight:300}
.site-header .s{font-size:10px;color:#8a8a8a;letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.progress{display:flex;gap:3px;max-width:660px;margin:28px auto 0;padding:0 16px}
.prog-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.prog-dot{width:32px;height:32px;border-radius:50%;background:#e0ddd8;color:#8a8a8a;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:"Noto Serif JP",serif;transition:all .3s;cursor:default}
.prog-dot.done{background:#c47a7a;color:#fff;cursor:pointer}
.prog-dot.active{background:#e8a0a0;color:#fff;box-shadow:0 0 0 3px #fdf0f0}
.prog-lbl{font-size:9px;color:#8a8a8a;text-align:center}
.prog-lbl.active{color:#1a1a2e}
.form-wrap{max-width:660px;margin:20px auto 0;padding:0 16px 40px}
.card{background:#fff;border-radius:14px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:1px solid #ede8e3}
.card-head{display:flex;align-items:baseline;gap:12px;margin-bottom:24px}
.card-kanji{font-family:"Noto Serif JP",serif;font-size:36px;color:#e8a0a0;line-height:1}
.card-title{font-size:20px;font-weight:300;color:#1a1a2e}
.card-step{font-size:11px;color:#8a8a8a;margin-top:2px}
.fields{display:flex;flex-direction:column;gap:16px}
.fw label{display:block;font-size:10px;font-weight:600;color:#8a8a8a;margin-bottom:5px;letter-spacing:.08em;text-transform:uppercase}
.fw input,.fw textarea,.fw select{width:100%;padding:10px 14px;border:1.5px solid #e0ddd8;border-radius:8px;font-size:14px;font-family:"Cormorant Garamond",Georgia,serif;background:#fff;color:#1a1a2e;outline:none;transition:border-color .2s}
.fw input:focus,.fw textarea:focus,.fw select:focus{border-color:#e8a0a0}
.fw textarea{resize:vertical;line-height:1.6}
.rep-block{background:#fdf0f0;border-radius:12px;padding:16px;border:1px solid #f0d8d8;position:relative;margin-bottom:12px}
.rep-rm{position:absolute;top:10px;right:10px;background:none;border:none;color:#8a8a8a;cursor:pointer;font-size:18px;line-height:1;padding:0}
.rep-inner{display:flex;flex-direction:column;gap:12px}
.rep-add{background:none;border:1.5px dashed #e8a0a0;color:#e8a0a0;padding:10px;border-radius:8px;cursor:pointer;font-size:14px;font-family:"Cormorant Garamond",serif;width:100%;margin-top:4px}
.nav{display:flex;justify-content:space-between;margin-top:20px}
.btn-ghost{background:none;border:1.5px solid #e0ddd8;color:#1a1a2e;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:14px;font-family:"Cormorant Garamond",serif}
.btn-ghost:disabled{color:#ccc;cursor:default}
.btn-sakura{background:#e8a0a0;color:#fff;border:none;padding:11px 32px;border-radius:8px;cursor:pointer;font-size:15px;font-family:"Cormorant Garamond",serif;letter-spacing:.04em}
.btn-dark{background:#1a1a2e;color:#fff;border:none;padding:11px 32px;border-radius:8px;cursor:pointer;font-size:15px;font-family:"Cormorant Garamond",serif;letter-spacing:.04em;display:inline-flex;align-items:center;gap:9px}
.btn-dark:disabled{background:#8a8a8a;cursor:default}
.btn-sm-ghost{background:none;border:1.5px solid #e0ddd8;color:#1a1a2e;padding:9px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:"Cormorant Garamond",serif}
.btn-sm-sakura{background:none;border:1.5px solid #e8a0a0;color:#e8a0a0;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-family:"Cormorant Garamond",serif}
.btn-sm-dark{background:#1a1a2e;color:#fff;border:none;padding:9px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-family:"Cormorant Garamond",serif}
.err{color:#c00;text-align:center;margin-top:14px;font-size:13px;display:none}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite}
.result-wrap{max-width:1080px;margin:0 auto;padding:28px 16px 40px;display:none}
.result-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.result-title{font-size:20px;font-weight:300;color:#1a1a2e}
.result-sub{font-size:10px;color:#8a8a8a;letter-spacing:.06em;margin-top:2px}
.result-actions{display:flex;gap:8px;flex-wrap:wrap}
.result-grid{display:grid;grid-template-columns:180px 1fr;gap:20px;align-items:start}
@media(max-width:600px){.result-grid{grid-template-columns:1fr}}
.tpl-label{font-size:10px;font-weight:600;color:#8a8a8a;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.tpl-list{display:flex;flex-direction:column;gap:8px}
.tpl-card{cursor:pointer;border:2px solid #e8e4e0;border-radius:10px;overflow:hidden;transition:all .2s;background:#fff}
.tpl-card.sel{transform:translateY(-1px)}
.tpl-preview{padding:10px;height:78px;position:relative;overflow:hidden}
.tpl-exec-bar{position:absolute;top:0;left:0;right:0;height:24px;background:#1a3a5c}
.tpl-sakura-bar{position:absolute;top:8px;left:8px;bottom:8px;width:3px;background:#e8a0a0;border-radius:2px}
.tpl-content{position:absolute;right:10px}
.tpl-h{height:7px;border-radius:2px;margin-bottom:4px;opacity:.85}
.tpl-s{height:3px;border-radius:2px;margin-bottom:7px;opacity:.35}
.tpl-l{height:1px;margin-bottom:5px}
.tpl-r{height:3px;border-radius:2px;margin-bottom:3px;background:#ccc}
.tpl-foot{padding:8px 10px;background:#fff}
.tpl-name{font-size:12px;font-weight:600;font-family:"Cormorant Garamond",serif}
.tpl-desc{font-size:10px;color:#8a8a8a}
.cv-box{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 28px rgba(0,0,0,.08);border:1px solid #ede8e3}
.cv-inner{padding:48px}
.site-footer{text-align:center;margin-top:16px;font-size:11px;color:#8a8a8a;letter-spacing:.06em}
.site-footer .k{font-family:"Noto Serif JP",serif;color:#e8a0a0}
.cv-k{font-family:"EB Garamond",Georgia,serif;color:#1a1a1a;line-height:1.7}
.cv-k .ch{border-bottom:3px double #2c3e50;padding-bottom:16px;margin-bottom:22px}
.cv-k .cn{font-size:30px;font-weight:700;letter-spacing:.04em;color:#2c3e50}
.cv-k .cp{font-size:13px;color:#666;letter-spacing:.14em;text-transform:uppercase;margin-top:4px}
.cv-k .cc{font-size:12px;color:#777;margin-top:7px}
.cv-k .cs{margin-bottom:20px}
.cv-k .csh{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#2c3e50;border-bottom:1px solid #2c3e50;padding-bottom:3px;margin-bottom:10px}
.cv-k .cj{font-weight:700;font-size:15px;color:#1a1a1a;margin-top:10px}
.cv-k .cb{font-size:13px;padding-left:16px;position:relative;color:#444;margin-bottom:3px;line-height:1.65}
.cv-k .cb::before{content:"\B7";position:absolute;left:0;color:#2c3e50}
.cv-k .ct{font-size:13px;color:#444;line-height:1.7}
.cv-s{font-family:"Cormorant Garamond",Georgia,serif;color:#1a1a2e}
.cv-s .ch{display:flex;margin-bottom:26px}
.cv-s .cbar{width:4px;background:linear-gradient(to bottom,#e8a0a0,#c47a7a);border-radius:3px;margin-right:18px;flex-shrink:0}
.cv-s .chi{flex:1}
.cv-s .cn{font-size:32px;font-weight:300;letter-spacing:.05em;line-height:1.1}
.cv-s .cp{font-size:12px;color:#e8a0a0;letter-spacing:.15em;text-transform:uppercase;margin-top:5px;font-weight:500}
.cv-s .cc{font-size:12px;color:#8a8a8a;margin-top:7px}
.cv-s .cd{font-family:"Noto Serif JP",serif;font-size:32px;color:#f0d8d8;align-self:center;padding-left:12px}
.cv-s .cs{margin-bottom:20px}
.cv-s .csh{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cv-s .cl1{height:1px;width:18px;background:#e8a0a0}
.cv-s .cst{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#e8a0a0}
.cv-s .cl2{flex:1;height:1px;background:#f0d8d8}
.cv-s .cj{font-weight:600;font-size:15px;color:#1a1a2e;margin-top:10px}
.cv-s .cb{font-size:13px;padding-left:16px;position:relative;color:#444;margin-bottom:3px;line-height:1.65}
.cv-s .cb::before{content:"\25E6";position:absolute;left:0;color:#e8a0a0}
.cv-s .ct{font-size:13px;color:#444;line-height:1.7}
.cv-e{font-family:"Playfair Display",Georgia,serif;color:#1a1a1a}
.cv-e .ch{background:#1a3a5c;color:#fff;padding:30px 32px;margin:-48px -48px 28px}
.cv-e .cn{font-size:28px;font-weight:700;letter-spacing:.05em}
.cv-e .cp{font-size:11px;color:#b8943f;letter-spacing:.22em;text-transform:uppercase;margin-top:6px}
.cv-e .cc{font-size:12px;color:rgba(255,255,255,.6);margin-top:10px}
.cv-e .cs{margin-bottom:22px}
.cv-e .csh{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cv-e .cst{font-size:10px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:#1a3a5c}
.cv-e .cl{flex:1;height:1px;background:#b8943f}
.cv-e .cj{font-weight:700;font-size:14px;color:#1a3a5c;margin-top:10px}
.cv-e .cb{font-size:13px;padding-left:16px;position:relative;color:#333;margin-bottom:4px;line-height:1.65}
.cv-e .cb::before{content:"\25B8";position:absolute;left:0;color:#b8943f}
.cv-e .ct{font-size:13px;color:#333;line-height:1.7}
.cv-m{font-family:"DM Serif Display",Georgia,serif;color:#111}
.cv-m .ch{margin-bottom:30px}
.cv-m .cn{font-size:34px;font-weight:400;letter-spacing:-.01em;line-height:1}
.cv-m .cp{font-size:12px;color:#888;letter-spacing:.08em;margin-top:8px;font-family:"DM Sans",sans-serif}
.cv-m .cc{font-size:12px;color:#bbb;margin-top:5px;font-family:"DM Sans",sans-serif}
.cv-m .cs{margin-bottom:22px;display:grid;grid-template-columns:110px 1fr;gap:0 20px}
.cv-m .csh{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#bbb;padding-top:3px;font-family:"DM Sans",sans-serif;line-height:1.4}
.cv-m .cbody{border-left:1px solid #ececec;padding-left:20px}
.cv-m .cj{font-weight:700;font-size:14px;color:#111;margin-top:8px}
.cv-m .cb{font-size:13px;padding-left:16px;position:relative;color:#444;margin-bottom:3px;line-height:1.65;font-family:"DM Sans",sans-serif}
.cv-m .cb::before{content:"\2013";position:absolute;left:0;color:#ccc}
.cv-m .ct{font-size:13px;color:#555;line-height:1.7;font-family:"DM Sans",sans-serif}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="site-header">
  <span class="k">&#26360;&#27969;</span>
  <div><div class="t">Lebenslauf-Generator</div><div class="s">Shoriu &middot; KI-gest&uuml;tzt</div></div>
</div>
<div class="progress" id="progress"></div>
<div class="form-wrap" id="form-wrap">
  <div class="card">
    <div class="card-head">
      <span class="card-kanji" id="ckanji"></span>
      <div><div class="card-title" id="ctitle"></div><div class="card-step" id="cstep"></div></div>
    </div>
    <div class="fields" id="fields"></div>
  </div>
  <div class="nav">
    <button class="btn-ghost" id="btn-back">&#8592; Zur&uuml;ck</button>
    <button class="btn-sakura" id="btn-next">Weiter &#8594;</button>
  </div>
  <div class="err" id="err"></div>
</div>
<div class="result-wrap" id="result-wrap">
  <div class="result-top">
    <div><div class="result-title">Ihr Lebenslauf</div><div class="result-sub">Template w&auml;hlen &middot; PDF exportieren</div></div>
    <div class="result-actions">
      <button class="btn-sm-ghost" id="btn-edit">&#8592; Bearbeiten</button>
      <button class="btn-sm-sakura" id="btn-regen">&#8634; Neu</button>
      <button class="btn-sm-dark" id="btn-print">&#8679; PDF</button>
    </div>
  </div>
  <div class="result-grid">
    <div><div class="tpl-label">Template</div><div class="tpl-list" id="tpl-list"></div></div>
    <div class="cv-box"><div class="cv-inner" id="cv-inner"></div></div>
  </div>
  <div class="site-footer"><span class="k">&#26360;&#27969;</span> Shoriu</div>
</div>
<script>
window.addEventListener('DOMContentLoaded', function() {

var Q = ‘”’;

var STEPS = [
{id:‘personal’, kanji:’個’, label:‘Persönliches’, fields:[
{key:‘name’,     label:‘Vollständiger Name’,       ph:‘Max Mustermann’,         type:‘text’},
{key:‘title’,    label:‘Zielposition’,                  ph:‘Senior Logistikleiter’,  type:‘text’},
{key:‘email’,    label:‘E-Mail’,                        ph:‘max@beispiel.at’,        type:‘email’},
{key:‘phone’,    label:‘Telefon’,                       ph:’+43 660 123 456’,        type:‘text’},
{key:‘location’, label:‘Wohnort’,                       ph:‘Altach, Vorarlberg’,     type:‘text’},
{key:‘linkedin’, label:‘LinkedIn / Website (optional)’, ph:‘linkedin.com/in/max’,    type:‘text’}
]},
{id:‘summary’, kanji:’志’, label:’Über mich’, fields:[
{key:‘summary’, label:‘Kurzbeschreibung & Karriereziele’, ph:‘Erfahrener Logistikprofi…’, type:‘textarea’, rows:5}
]},
{id:‘experience’, kanji:’歴’, label:‘Erfahrung’, rep:true, fields:[
{key:‘company’,     label:‘Unternehmen’,        ph:‘medmix Switzerland AG’,  type:‘text’},
{key:‘role’,        label:‘Position’,            ph:‘Teamleader Logistik’,    type:‘text’},
{key:‘period’,      label:‘Zeitraum’,            ph:‘2020 - heute’,           type:‘text’},
{key:‘description’, label:‘Aufgaben & Erfolge’,  ph:‘Leitung eines Teams…’, type:‘textarea’, rows:3}
]},
{id:‘education’, kanji:’学’, label:‘Ausbildung’, rep:true, fields:[
{key:‘institution’, label:‘Institution’,             ph:‘HTL Rankweil’,                   type:‘text’},
{key:‘degree’,      label:‘Abschluss / Studiengang’, ph:‘Matura, Fachrichtung Elektronik’, type:‘text’},
{key:‘period’,      label:‘Zeitraum’,                ph:‘2010 - 2015’,                     type:‘text’}
]},
{id:‘skills’, kanji:’技’, label:‘Fähigkeiten’, fields:[
{key:‘technical’, label:‘Fachliche Kenntnisse’, ph:‘SAP WM, MS Excel, Lean Management’,     type:‘textarea’, rows:2},
{key:‘soft’,      label:‘Soft Skills’,           ph:‘Teamfuehrung, Kommunikation’,           type:‘textarea’, rows:2},
{key:‘languages’, label:‘Sprachen’,              ph:‘Deutsch (Muttersprache), Englisch (B2)’, type:‘textarea’, rows:2}
]},
{id:‘extras’, kanji:’他’, label:‘Weiteres’, fields:[
{key:‘certifications’, label:‘Zertifikate (optional)’, ph:‘Lean Six Sigma Yellow Belt’, type:‘textarea’, rows:2},
{key:‘hobbies’,        label:‘Interessen (optional)’,  ph:‘Softwareentwicklung, Japanische Kultur’, type:‘textarea’, rows:2},
{key:‘tone’,     label:‘Ton’,     type:‘select’, opts:[‘Professionell und formal’,‘Modern und direkt’,‘Kreativ und persoenlich’]},
{key:‘language’, label:‘Sprache’, type:‘select’, opts:[‘Deutsch’,‘Englisch’]}
]}
];

var TPLS = [
{id:‘sakura’,    name:‘Sakura’,    desc:‘Elegant & modern’,  acc:’#e8a0a0’, bg:’#fdf8f8’, h:’#e8a0a0’, ln:’#f0d8d8’, sak:true},
{id:‘klassisch’, name:‘Klassisch’, desc:‘Zeitlos & bewaehrt’,acc:’#2c3e50’, bg:’#f8f7f5’, h:’#2c3e50’, ln:’#2c3e50’},
{id:‘executive’, name:‘Executive’, desc:‘Senior & Fuehrung’, acc:’#1a3a5c’, bg:’#f0f4f8’, h:’#1a3a5c’, ln:’#b8943f’, dark:true},
{id:‘minimal’,   name:‘Minimal’,   desc:‘Tech & Design’,     acc:’#444’,    bg:’#fafafa’, h:’#444’,    ln:’#e8e8e8’}
];

var step=0, tpl=‘sakura’, md=’’;
var data={
personal:{name:’’,title:’’,email:’’,phone:’’,location:’’,linkedin:’’},
summary:{summary:’’},
experience:[{company:’’,role:’’,period:’’,description:’’}],
education:[{institution:’’,degree:’’,period:’’}],
skills:{technical:’’,soft:’’,languages:’’},
extras:{certifications:’’,hobbies:’’,tone:‘Professionell und formal’,language:‘Deutsch’}
};

var eProgress=document.getElementById(‘progress’);
var eFormWrap=document.getElementById(‘form-wrap’);
var eResultWrap=document.getElementById(‘result-wrap’);
var eFields=document.getElementById(‘fields’);
var eKanji=document.getElementById(‘ckanji’);
var eTitle=document.getElementById(‘ctitle’);
var eStepNum=document.getElementById(‘cstep’);
var eBack=document.getElementById(‘btn-back’);
var eNext=document.getElementById(‘btn-next’);
var eErr=document.getElementById(‘err’);
var eTplList=document.getElementById(‘tpl-list’);
var eCVInner=document.getElementById(‘cv-inner’);

document.getElementById(‘btn-edit’).onclick=showForm;
document.getElementById(‘btn-regen’).onclick=generate;
document.getElementById(‘btn-print’).onclick=printCV;
eBack.onclick=function(){save();if(step>0)renderStep(step-1);};
eNext.onclick=function(){save();if(step<STEPS.length-1)renderStep(step+1);else generate();};

function buildProgress(){
var h=’’;
for(var i=0;i<STEPS.length;i++){
h+=’<div class="prog-item" id="pi'+i+'"><div class="prog-dot" id="pd'+i+'">’+STEPS[i].kanji+’</div><div class="prog-lbl" id="pl'+i+'">’+STEPS[i].label+’</div></div>’;
}
eProgress.innerHTML=h;
for(var j=0;j<STEPS.length;j++){
(function(idx){
var el=document.getElementById(‘pi’+idx);
if(el)el.onclick=function(){if(idx<step){save();renderStep(idx);}};
})(j);
}
}

function updateProgress(){
for(var i=0;i<STEPS.length;i++){
var d=document.getElementById(‘pd’+i);
var l=document.getElementById(‘pl’+i);
if(!d||!l)continue;
d.className=‘prog-dot’+(i===step?’ active’:i<step?’ done’:’’);
l.className=‘prog-lbl’+(i===step?’ active’:’’);
}
}

function renderStep(n){
step=n;
var s=STEPS[step];
eKanji.innerHTML=s.kanji;
eTitle.innerHTML=s.label;
eStepNum.textContent=’Schritt ‘+(step+1)+’ von ’+STEPS.length;
updateProgress();
eBack.disabled=(step===0);
if(step===STEPS.length-1){
eNext.className=‘btn-dark’;
eNext.textContent=‘Lebenslauf erstellen’;
}else{
eNext.className=‘btn-sakura’;
eNext.textContent=‘Weiter’;
}
eNext.disabled=false;
if(s.rep)renderRepeat(s);else renderFlat(s);
}

function esc(v){return(v||’’).replace(/&/g,’&’).replace(/”/g,’"’).replace(/</g,’<’).replace(/>/g,’>’);}

function fieldHTML(f,val){
if(f.type===‘textarea’){return ‘<textarea rows="'+(f.rows||3)+'" placeholder="'+esc(f.ph||'')+'" data-key="'+f.key+'">’+esc(val)+’</textarea>’;}
if(f.type===‘select’){
var o=’’;
for(var i=0;i<f.opts.length;i++)o+=’<option’+(f.opts[i]===val?’ selected’:’’)+’>’+f.opts[i]+’</option>’;
return ‘<select data-key="'+f.key+'">’+o+’</select>’;
}
return ‘<input type="'+f.type+'" placeholder="'+esc(f.ph||'')+'" value="'+esc(val)+'" data-key="'+f.key+'"/>’;
}

function repFieldHTML(f,val,idx){
if(f.type===‘textarea’){return ‘<textarea rows="'+(f.rows||3)+'" placeholder="'+esc(f.ph||'')+'" data-key="'+f.key+'" data-idx="'+idx+'">’+esc(val)+’</textarea>’;}
return ‘<input type="'+f.type+'" placeholder="'+esc(f.ph||'')+'" value="'+esc(val)+'" data-key="'+f.key+'" data-idx="'+idx+'"/>’;
}

function renderFlat(s){
var h=’’,d=data[s.id];
for(var i=0;i<s.fields.length;i++){
var f=s.fields[i];
h+=’<div class="fw"><label>’+f.label+’</label>’+fieldHTML(f,d[f.key]||’’)+’</div>’;
}
eFields.innerHTML=h;
}

function renderRepeat(s){

function parseCV(raw){
if(!raw)return{name:’’,pos:’’,contact:’’,secs:[]};
var lines=raw.split(’\n’),name=’’,pos=’’,contact=’’,secs=[],cur=null;
for(var i=0;i<lines.length;i++){
var l=lines[i].trim();
if(!l)continue;
if(l.indexOf(’# ‘)===0&&l.indexOf(’## ‘)<0){name=l.slice(2).trim();}
else if(!pos&&l.indexOf(’**’)===0&&l.lastIndexOf(’**’)>1&&l.indexOf(’|’)<0){pos=l.replace(/**/g,’’).trim();}
else if(!contact&&(l.indexOf(’@’)>=0||l.indexOf(’|’)>=0)){contact=l.replace(/**/g,’’).trim();}
else if(l.indexOf(’## ‘)===0){cur={h:l.slice(3).trim(),items:[]};secs.push(cur);}
else if(l.indexOf(’### ‘)===0){if(cur)cur.items.push({t:‘j’,v:l.slice(4).trim()});}
else if(l.indexOf(’- ‘)===0||l.indexOf(’* ‘)===0){if(cur)cur.items.push({t:‘b’,v:l.slice(2).trim().replace(/**/g,’’)});}
else if(l.indexOf(’**’)===0&&l.lastIndexOf(’**’)>1){if(cur)cur.items.push({t:‘j’,v:l.replace(/**/g,’’).trim()});}
else{if(cur)cur.items.push({t:‘t’,v:l.replace(/**/g,’’)});}
}
return{name:name,pos:pos,contact:contact,secs:secs};
}

function x(v){return(v||’’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’);}

function itemsHTML(items,pfx){
var h=’’;
for(var i=0;i<items.length;i++){
var it=items[i];
if(it.t===‘j’)h+=’<div class="'+pfx+' cj">’+x(it.v)+’</div>’;
else if(it.t===‘b’)h+=’<div class="'+pfx+' cb">’+x(it.v)+’</div>’;
else h+=’<div class="'+pfx+' ct">’+x(it.v)+’</div>’;
}
return h;
}
