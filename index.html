/* Header */

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const STEPS = [
  { id:"personal", kanji:"個", label:"Persönliches", fields:[
    {key:"name",     label:"Vollständiger Name",          placeholder:"Max Mustermann",          type:"text"},
    {key:"title",    label:"Zielposition",                placeholder:"Senior Logistikleiter",   type:"text"},
    {key:"email",    label:"E-Mail",                      placeholder:"max@beispiel.at",         type:"email"},
    {key:"phone",    label:"Telefon",                     placeholder:"+43 660 123 456",         type:"text"},
    {key:"location", label:"Wohnort",                     placeholder:"Altach, Vorarlberg",      type:"text"},
    {key:"linkedin", label:"LinkedIn / Website (optional)",placeholder:"linkedin.com/in/max",   type:"text"},
  ]},
  { id:"summary", kanji:"志", label:"Über mich", fields:[
    {key:"summary", label:"Kurzbeschreibung & Karriereziele", placeholder:"Erfahrener Logistikprofi mit 8 Jahren Erfahrung...", type:"textarea", rows:5},
  ]},
  { id:"experience", kanji:"歴", label:"Erfahrung", repeatable:true, fields:[
    {key:"company",     label:"Unternehmen",   placeholder:"medmix Switzerland AG",          type:"text"},
    {key:"role",        label:"Position",       placeholder:"Teamleader Logistik",            type:"text"},
    {key:"period",      label:"Zeitraum",       placeholder:"März 2020 – heute",              type:"text"},
    {key:"description", label:"Aufgaben & Erfolge", placeholder:"Leitung eines Teams, Reduktion der Fehlerquote um 30%...", type:"textarea", rows:3},
  ]},
  { id:"education", kanji:"学", label:"Ausbildung", repeatable:true, fields:[
    {key:"institution", label:"Institution",           placeholder:"HTL Rankweil",                    type:"text"},
    {key:"degree",      label:"Abschluss / Studiengang",placeholder:"Matura, Fachrichtung Elektronik",type:"text"},
    {key:"period",      label:"Zeitraum",              placeholder:"2010 – 2015",                     type:"text"},
  ]},
  { id:"skills", kanji:"技", label:"Fähigkeiten", fields:[
    {key:"technical", label:"Fachliche Kenntnisse", placeholder:"SAP WM, MS Excel, Lean Management",    type:"textarea", rows:2},
    {key:"soft",      label:"Soft Skills",           placeholder:"Teamführung, Kommunikation, Problemlösung", type:"textarea", rows:2},
    {key:"languages", label:"Sprachen",              placeholder:"Deutsch (Muttersprache), Englisch (B2)", type:"textarea", rows:2},
  ]},
  { id:"extras", kanji:"他", label:"Weiteres", fields:[
    {key:"certifications", label:"Zertifikate (optional)",  placeholder:"Lean Six Sigma Yellow Belt, SAP 2022", type:"textarea", rows:2},
    {key:"hobbies",        label:"Interessen (optional)",   placeholder:"Softwareentwicklung, Japanische Kultur", type:"textarea", rows:2},
    {key:"tone",     label:"Ton",     type:"select", options:["Professionell & formal","Modern & direkt","Kreativ & persönlich"]},
    {key:"language", label:"Sprache", type:"select", options:["Deutsch","Englisch"]},
  ]},
];

const TEMPLATES = [
  {id:"sakura",    name:"Sakura",    desc:"Elegant & modern",  accent:"#e8a0a0", hdr:"#fdf8f8", h:"#e8a0a0", line:"#f0d8d8"},
  {id:"klassisch", name:"Klassisch", desc:"Zeitlos & bewährt", accent:"#2c3e50", hdr:"#f8f7f5", h:"#2c3e50", line:"#2c3e50"},
  {id:"executive", name:"Executive", desc:"Senior & Führung",  accent:"#1a3a5c", hdr:"#f0f4f8", h:"#1a3a5c", line:"#b8943f", dark:true},
  {id:"minimal",   name:"Minimal",   desc:"Tech & Design",     accent:"#444",    hdr:"#fafafa", h:"#444",    line:"#e8e8e8"},
];

let currentStep = 0;
let currentTemplate = "sakura";
let rawMarkdown = "";

// Data store
const data = {
  personal:   {name:"",title:"",email:"",phone:"",location:"",linkedin:""},
  summary:    {summary:""},
  experience: [{company:"",role:"",period:"",description:""}],
  education:  [{institution:"",degree:"",period:""}],
  skills:     {technical:"",soft:"",languages:""},
  extras:     {certifications:"",hobbies:"",tone:"Professionell & formal",language:"Deutsch"},
};

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  buildProgress();
  buildTemplateList();
  renderStep(0);
}

// ── Progress ──────────────────────────────────────────────────────────────────
function buildProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = STEPS.map((s,i) => `
    <div class="prog-item" id="prog-${i}" onclick="goToStep(${i})">
      <div class="prog-dot" id="dot-${i}">${s.kanji}</div>
      <div class="prog-label" id="lbl-${i}">${s.label}</div>
    </div>`).join('');
}

function updateProgress(step) {
  STEPS.forEach((_,i) => {
    const dot = document.getElementById(`dot-${i}`);
    const lbl = document.getElementById(`lbl-${i}`);
    dot.className = 'prog-dot' + (i===step?' active':i<step?' done':'');
    lbl.className = 'prog-label' + (i===step?' active':'');
  });
}

function goToStep(i) {
  if (i < currentStep) { saveCurrentStep(); renderStep(i); }
}

// ── Step rendering ────────────────────────────────────────────────────────────
function renderStep(step) {
  currentStep = step;
  const s = STEPS[step];
  document.getElementById('step-kanji').textContent = s.kanji;
  document.getElementById('step-title').textContent = s.label;
  document.getElementById('step-num').textContent   = `Schritt ${step+1} von ${STEPS.length}`;
  updateProgress(step);

  const isLast = step === STEPS.length - 1;
  const btnNext = document.getElementById('btn-next');
  const btnBack = document.getElementById('btn-back');

  btnBack.disabled = step === 0;
  if (isLast) {
    btnNext.className = 'btn-dark';
    btnNext.innerHTML = '✦ Lebenslauf erstellen';
    btnNext.onclick = generateCV;
  } else {
    btnNext.className = 'btn-sakura';
    btnNext.innerHTML = 'Weiter →';
    btnNext.onclick = nextStep;
  }

  const container = document.getElementById('fields');
  if (s.repeatable) {
    renderRepeatSection(container, s);
  } else {
    renderFlatFields(container, s);
  }
}

function renderFlatFields(container, s) {
  const sData = data[s.id];
  container.innerHTML = s.fields.map(f => `
    <div class="field-wrap">
      <label>${f.label}</label>
      ${buildFieldHTML(f, sData[f.key] || '')}
    </div>`).join('');
}

function buildFieldHTML(f, value) {
  if (f.type === 'textarea') {
    return `<textarea rows="${f.rows||3}" placeholder="${f.placeholder||''}" data-key="${f.key}" oninput="setField(this)">${esc(value)}</textarea>`;

}
if (f.type === ‘select’) {
const opts = f.options.map(o => `<option${o===value?' selected':''}>${o}</option>`).join(’’);
return `<select data-key="${f.key}" onchange="setField(this)">${opts}</select>`;
}
return `<input type="${f.type}" placeholder="${f.placeholder||''}" value="${esc(value)}" data-key="${f.key}" oninput="setField(this)"/>`;
}

function setField(el) {
const s = STEPS[currentStep];
if (!s.repeatable) data[s.id][el.dataset.key] = el.value;
}

function renderRepeatSection(container, s) {
const items = data[s.id];
container.innerHTML = ` <div id="repeat-list">${items.map((item,idx) => buildRepeatItem(s, item, idx)).join('')}</div> <button class="repeat-add" onclick="addRepeat()">+ Eintrag hinzufügen</button>`;
}

function buildRepeatItem(s, item, idx) {
const canRemove = data[s.id].length > 1;
return `<div class="repeat-block" style="margin-bottom:12px" data-idx="${idx}"> ${canRemove ?`<button class="repeat-remove" onclick="removeRepeat(${idx})">×</button>`: ''} <div class="field-group"> ${s.fields.map(f =>`
<div class="field-wrap">
<label>${f.label}</label>
${buildRepeatFieldHTML(f, item[f.key]||’’, idx)}
</div>`).join('')} </div> </div>`;
}

function buildRepeatFieldHTML(f, value, idx) {
if (f.type === ‘textarea’) {
return `<textarea rows="${f.rows||3}" placeholder="${f.placeholder||''}" data-key="${f.key}" data-idx="${idx}" oninput="setRepeatField(this)">${esc(value)}</textarea>`;
}
return `<input type="${f.type}" placeholder="${f.placeholder||''}" value="${esc(value)}" data-key="${f.key}" data-idx="${idx}" oninput="setRepeatField(this)"/>`;
}

function setRepeatField(el) {
const s = STEPS[currentStep];
const idx = parseInt(el.dataset.idx);
data[s.id][idx][el.dataset.key] = el.value;
}

function addRepeat() {
const s = STEPS[currentStep];
const blank = {};
s.fields.forEach(f => blank[f.key] = ‘’);
data[s.id].push(blank);
renderRepeatSection(document.getElementById(‘fields’), s);
}

function removeRepeat(idx) {
const s = STEPS[currentStep];
data[s.id].splice(idx, 1);
renderRepeatSection(document.getElementById(‘fields’), s);
}

function saveCurrentStep() {
const s = STEPS[currentStep];
if (!s.repeatable) {
document.querySelectorAll(’#fields [data-key]’).forEach(el => {
data[s.id][el.dataset.key] = el.value;
});
}
}

function esc(str) {
return (str||’’).replace(/&/g,’&’).replace(/”/g,’"’).replace(/</g,’<’).replace(/>/g,’>’);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function nextStep() { saveCurrentStep(); renderStep(currentStep + 1); }
function prevStep() { saveCurrentStep(); renderStep(currentStep - 1); }

function backToForm() {
document.getElementById(‘result-wrap’).style.display = ‘none’;
document.getElementById(‘progress’).style.display    = ‘flex’;
document.getElementById(‘form-wrap’).style.display   = ‘block’;
}

// ── Generate ──────────────────────────────────────────────────────────────────
async function generateCV() {
saveCurrentStep();
const btn   = document.getElementById(‘btn-next’);
const btnR  = document.getElementById(‘btn-regen’);
const errEl = document.getElementById(‘error-msg’);
errEl.style.display = ‘none’;

[btn, btnR].forEach(b => { if(b){ b.disabled=true; b.innerHTML=’<span class="spinner"></span> Generiere…’; }});

try {
const res  = await fetch(‘https://api.anthropic.com/v1/messages’, {
method: ‘POST’,
headers: { ‘Content-Type’: ‘application/json’ },
body: JSON.stringify({
model: ‘claude-sonnet-4-20250514’,
max_tokens: 1000,
messages: [{ role: ‘user’, content: buildPrompt() }],
}),
});
const json = await res.json();
rawMarkdown = (json.content || []).map(b => b.text || ‘’).join(’’);
showResult();
} catch(e) {
errEl.textContent = ‘Fehler beim Generieren. Bitte erneut versuchen.’;
errEl.style.display = ‘block’;
} finally {
btn.disabled = false;
btn.innerHTML = ‘✦ Lebenslauf erstellen’;
if(btnR){ btnR.disabled=false; btnR.textContent=‘↺ Neu’; }
}
}

function buildPrompt() {
const {personal:p, summary:s, experience:ex, education:ed, skills:sk, extras:e} = data;
const expTxt = ex.map(x=>`- ${x.role} bei ${x.company} (${x.period}): ${x.description}`).join(’\n’);
const eduTxt = ed.map(x=>`- ${x.degree} an ${x.institution} (${x.period})`).join(’\n’);
return `Du bist ein professioneller HR-Berater. Erstelle einen Lebenslauf auf ${e.language||‘Deutsch’}, Ton: “${e.tone||‘Professionell’}”.

DATEN:
Name: ${p.name} | Position: ${p.title}
Kontakt: ${p.email} | ${p.phone} | ${p.location}${p.linkedin?’ | ‘+p.linkedin:’’}
Profil: ${s.summary}
Erfahrung:\n${expTxt}
Ausbildung:\n${eduTxt}
Fachkenntnisse: ${sk.technical}
Soft Skills: ${sk.soft}
Sprachen: ${sk.languages}
${e.certifications?‘Zertifikate: ‘+e.certifications:’’}
${e.hobbies?‘Interessen: ‘+e.hobbies:’’}

FORMAT (exakt in Markdown):

# [Name]

**[Position]**
[E-Mail] | [Tel] | [Ort]${p.linkedin?’ | [LinkedIn]’:’’}

## Profil

[2-3 optimierte Sätze]

## Berufserfahrung

### [Rolle] · [Firma] | [Zeitraum]

- [aktiv formuliert]

## Ausbildung

### [Abschluss] · [Institution] | [Zeitraum]

## Kenntnisse & Sprachen

- Fachlich: …
- Soft Skills: …
- Sprachen: …
  ${e.certifications?’\n## Zertifikate\n- …’:’’}${e.hobbies?’\n## Interessen\n[kurz]’:’’}

Nur Lebenslauf, keine Erklärungen.`;
}

// ── Result ────────────────────────────────────────────────────────────────────
function showResult() {
document.getElementById(‘progress’).style.display  = ‘none’;
document.getElementById(‘form-wrap’).style.display = ‘none’;
const rw = document.getElementById(‘result-wrap’);
rw.style.display = ‘block’;
renderCV();
rw.scrollIntoView({behavior:‘smooth’});
}

function selectTemplate(id) {
currentTemplate = id;
buildTemplateList();
renderCV();
}

function buildTemplateList() {
document.getElementById(‘tpl-list’).innerHTML = TEMPLATES.map(t => {
const sel = t.id === currentTemplate;
return ` <div class="tpl-card${sel?' selected':''}" onclick="selectTemplate('${t.id}')" style="border-color:${sel?t.accent:'#e8e4e0'};box-shadow:${sel?`0 4px 16px ${t.accent}25`:'none'}"> <div class="tpl-preview" style="background:${t.hdr}"> ${t.id==='executive'?`<div style="position:absolute;top:0;left:0;right:0;height:24px;background:#1a3a5c"></div>`:''} ${t.id==='sakura'?`<div style="position:absolute;top:8px;left:8px;bottom:8px;width:3px;background:#e8a0a0;border-radius:2px"></div>`:''} <div style="position:absolute;top:${t.id==='executive'?'30':'10'}px;left:${t.id==='sakura'?'18':'10'}px;right:10px"> <div class="tpl-bar"  style="width:55%;background:${t.h}"></div> <div class="tpl-sub"  style="width:35%;background:${t.h}"></div> <div class="tpl-line" style="background:${t.line}"></div> <div class="tpl-row" style="width:65%"></div> <div class="tpl-row" style="width:45%"></div> <div class="tpl-row" style="width:80%"></div> </div> </div> <div class="tpl-footer" style="border-top-color:${sel?t.accent:'#f0ece8'}"> <div class="tpl-name" style="color:${sel?t.accent:'#1a1a2e'}">${t.name}</div> <div class="tpl-desc">${t.desc}</div> </div> </div>`;
}).join(’’);
}

// ── Markdown → HTML ───────────────────────────────────────────────────────────
function parseCV(md) {
if (!md) return {name:’’,pos:’’,contact:’’,sections:[]};
const lines = md.split(’\n’);
let name=’’, pos=’’, contact=’’;
const sections=[];
let cur=null;
for (const raw of lines) {
const l = raw.trim();
if (!l) continue;
if (l.startsWith(’# ‘))           { name = l.slice(2).trim(); }
else if (!pos && l.startsWith(’**’) && l.endsWith(’**’) && !l.includes(’|’)) { pos = l.replace(/**/g,’’).trim(); }
else if (!contact && (l.includes(’@’)||l.includes(’|’)||l.includes(‘Tel’)))  { contact = l.replace(/**/g,’’).trim(); }
else if (l.startsWith(’## ‘))  { cur={heading:l.slice(3).trim(),items:[]}; sections.push(cur); }
else if (l.startsWith(’### ‘)) { if(cur) cur.items.push({t:‘job’, text:l.slice(4).trim()}); }
else if (l.startsWith(’- ‘)||l.startsWith(’* ‘)) { if(cur) cur.items.push({t:‘bul’, text:l.slice(2).trim().replace(/**/g,’’)}); }
else if (l.startsWith(’**’)&&l.endsWith(’**’))   { if(cur) cur.items.push({t:‘job’, text:l.replace(/**/g,’’).trim()}); }
else { if(cur) cur.items.push({t:‘txt’, text:l.replace(/**/g,’’)}); }
}
return {name,pos,contact,sections};
}

function renderCV() {
const cv  = parseCV(rawMarkdown);
const tpl = currentTemplate;
const el  = document.getElementById(‘cv-inner’);

let html = ‘’;

if (tpl===‘klassisch’) {
html = `<div class="cv-klassisch"> <div class="cv-head"> <div class="cv-name">${esc(cv.name||'Name')}</div> ${cv.pos     ? `<div class="cv-pos">${esc(cv.pos)}</div>`: ''} ${cv.contact ?`<div class="cv-con">${esc(cv.contact)}</div>` : ''} </div> ${cv.sections.map(s=>`
<div class="cv-sec">
<div class="cv-sh">${esc(s.heading)}</div>
${s.items.map(i=>itemHTML(i,‘cv-klassisch’)).join(’’)}
</div>`).join('')} </div>`;
} else if (tpl===‘sakura’) {
html = `<div class="cv-sakura"> <div class="cv-head"> <div class="cv-bar"></div> <div class="cv-hinfo"> <div class="cv-name">${esc(cv.name||'Name')}</div> ${cv.pos     ? `<div class="cv-pos">${esc(cv.pos)}</div>`: ''} ${cv.contact ?`<div class="cv-con">${esc(cv.contact)}</div>` : ''} </div> <div class="cv-deco">書</div> </div> ${cv.sections.map(s=>`
<div class="cv-sec">
<div class="cv-sh"><div class="cv-sh-line1"></div><div class="cv-sh-text">${esc(s.heading)}</div><div class="cv-sh-line2"></div></div>
${s.items.map(i=>itemHTML(i,‘cv-sakura’)).join(’’)}
</div>`).join('')} </div>`;
} else if (tpl===‘executive’) {
html = `<div class="cv-executive"> <div class="cv-head"> <div class="cv-name">${esc(cv.name||'Name')}</div> ${cv.pos     ? `<div class="cv-pos">${esc(cv.pos)}</div>`: ''} ${cv.contact ?`<div class="cv-con">${esc(cv.contact)}</div>` : ''} </div> ${cv.sections.map(s=>`
<div class="cv-sec">
<div class="cv-sh"><div class="cv-sh-text">${esc(s.heading)}</div><div class="cv-sh-line"></div></div>
${s.items.map(i=>itemHTML(i,‘cv-executive’)).join(’’)}
</div>`).join('')} </div>`;
} else {
html = `<div class="cv-minimal"> <div class="cv-head"> <div class="cv-name">${esc(cv.name||'Name')}</div> ${cv.pos     ? `<div class="cv-pos">${esc(cv.pos)}</div>`: ''} ${cv.contact ?`<div class="cv-con">${esc(cv.contact)}</div>` : ''} </div> ${cv.sections.map(s=>`
<div class="cv-sec">
<div class="cv-sh">${esc(s.heading)}</div>
<div class="cv-body">${s.items.map(i=>itemHTML(i,‘cv-minimal’)).join(’’)}</div>
</div>`).join('')} </div>`;
}

el.innerHTML = html;
}

function itemHTML(item, cls) {
if (item.t===‘job’) return `<div class="${cls.split('-')[1]==='minimal'?'cv-minimal ':''} cv-job">${esc(item.text)}</div>`;
if (item.t===‘bul’) return `<div class="cv-bul">${esc(item.text)}</div>`;
return `<div class="cv-txt">${esc(item.text)}</div>`;
}

// ── Print ─────────────────────────────────────────────────────────────────────
function printCV() {
const cv = parseCV(rawMarkdown);
const tplStyles = {
klassisch: `body{font-family:'EB Garamond',Georgia,serif}h1{font-size:26px;color:#2c3e50;border-bottom:3px double #2c3e50;padding-bottom:8px}h2{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#2c3e50;border-bottom:1px solid #2c3e50;padding-bottom:3px;margin-top:20px}`,
sakura:    `body{font-family:'Cormorant Garamond',Georgia,serif}h1{font-size:28px;font-weight:300;border-left:4px solid #e8a0a0;padding-left:14px}h2{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#e8a0a0;margin-top:20px}`,
executive: `body{font-family:'Playfair Display',Georgia,serif}.hdr{background:#1a3a5c;color:#fff;padding:24px;margin:-20px -20px 20px}h1{color:#fff;font-size:26px;margin:0}h2{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#1a3a5c;border-bottom:1px solid #b8943f;padding-bottom:4px;margin-top:20px}`,
minimal:   `body{font-family:'Georgia',serif}h1{font-size:30px;font-weight:400}h2{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#aaa;margin-top:20px}`,
};
const md = (rawMarkdown||’’)
.replace(/^# (.+)$/gm,   currentTemplate===‘executive’?’<div class="hdr"><h1>$1</h1>’:’<h1>$1</h1>’)
.replace(/^## (.+)$/gm,  currentTemplate===‘executive’?’</div><h2>$1</h2>’:’<h2>$1</h2>’)
.replace(/^### (.+)$/gm, ‘<h3 style="font-size:14px;margin:10px 0 3px">$1</h3>’)
.replace(/**(.+?)**/g,’<strong>$1</strong>’)
.replace(/^[-*] (.+)$/gm,’<li>$1</li>’)
.split(’\n’).filter(l=>l.trim()).join(’\n’);

const w = window.open(’’,’_blank’);
w.document.write(`<!DOCTYPE html><html><head><title>Lebenslauf · ${cv.name||''}</title> <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Cormorant+Garamond:wght@300;400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/> <style>body{max-width:740px;margin:20px auto;color:#111;line-height:1.7;padding:20px;font-size:13px}ul{padding-left:16px}li{margin-bottom:3px}h3{margin:10px 0 3px}${tplStyles[currentTemplate]||''}@media print{body{margin:0}}</style> </head><body>${md}</body></html>`);
w.document.close(); w.print();
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
